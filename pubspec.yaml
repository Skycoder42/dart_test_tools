name: dart_test_tools
description: Additional tools and helpers for writing dart unit tests and GitHub Actions Workflows.
version: 7.1.0
homepage: https://github.com/Skycoder42/dart_test_tools

environment:
  sdk: ^3.11.0

executables:
  generate-build-number: generate_build_number
  generate-pkgbuild: generate_pkgbuild
  cider:
  flatpak-repo-init: flatpak_repo_init
  export-xml-changelog: export_xml_changelog
  generate-cask: generate_cask
  auto-update: auto_update
  auto-export: auto_export

dependencies:
  analysis_server_plugin: ^0.3.7
  analyzer: ">=10.0.1 <13.0.0"
  args: ^2.7.0
  build: ^4.0.5
  build_config: ^1.3.0
  change: ^0.7.5
  checked_yaml: ^2.0.4
  cider: ^0.2.10
  code_builder: ^4.11.1
  collection: ^1.19.1
  crypto: ^3.0.7
  dart_style: ^3.1.7
  dotenv: ^4.2.0
  flutter_lints: ^6.0.0
  freezed_annotation: ^3.1.0
  glob: ^2.1.3
  json_annotation: ^4.11.0
  lint: ^2.8.0
  lints: ^6.1.0
  logging: ^1.3.0
  markdown: ^7.3.1
  meta: ^1.17.0
  mocktail: ^1.0.5
  path: ^1.9.1
  pub_semver: ^2.2.0
  pubspec_parse: ^1.5.0
  stack_trace: ^1.12.1
  stream_channel: ^2.1.4
  synchronized: ^3.4.0
  test: ^1.30.0
  xml: ^6.6.1
  yaml: ^3.1.3
  yaml_edit: ^2.2.4
  yaml_writer: ^2.1.0

dev_dependencies:
  build_runner: ^2.13.1
  freezed: ^3.2.5
  html: ^0.15.6
  http: ^1.6.0
  json_serializable: ^6.13.1

cider:
  link_template:
    tag: https://github.com/Skycoder42/dart_test_tools/releases/tag/v%tag% # initial release link template
    diff: https://github.com/Skycoder42/dart_test_tools/compare/v%from%...v%to% # subsequent releases link template

dart_pre_commit:
  pull-up-dependencies:
    allowed:
      - analysis_server_plugin
      - analyzer
      - collection
      - dart_style
      - meta
      - path
      - stack_trace
      - stream_channel
      - test
      - xml
