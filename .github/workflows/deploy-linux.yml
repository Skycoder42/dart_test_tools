on:
  workflow_call:
    inputs:
      flatpakPlatformImage:
        type: string
        required: false
        default: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
        description: The docker image to be used to build the bundle with
      artifactPrefix:
        type: string
        required: false
        default: ""
        description: The prefix for build/bundle artifact names, combined into the normalized "<prefix>-<type>-<platform>" name. If left empty, it falls back at runtime to the package name from the pubspec.yaml in "workingDirectory". Set this to keep artifact names unique when multiple packages are built within the same pipeline.
    secrets:
      gpgKeyId:
        required: false
        description: The id of the gpgKey
      gpgKey:
        required: false
        description: The GPG key to sign the flatpak bundle and repository with.
jobs:
  deploy_linux:
    name: Deploy flatpak bundles to GitHub Pages
    environment: flatpak
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.flatpakPlatformImage }}
      options: --privileged
    steps:
      - name: '[Validate Inputs] Ensure gpgKeyId is set'
        run: |
          if [[ '${{ secrets.gpgKeyId }}' == '' ]]; then
            echo '::error::Platform is enabled, but required input gpgKeyId is not set'
            exit 1
          fi
        shell: bash
      - name: '[Validate Inputs] Ensure gpgKey is set'
        run: |
          if [[ '${{ secrets.gpgKey }}' == '' ]]; then
            echo '::error::Platform is enabled, but required input gpgKey is not set'
            exit 1
          fi
        shell: bash
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
          path: repo
          ref: gh-pages
      - name: Download flatpak bundle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ${{ inputs.artifactPrefix || '*' }}-flatpak-linux-*
          path: bundles
      - name: Import GPG key
        run: echo '${{ secrets.gpgKey }}' | gpg --import
      - name: Import bundles into repository
        run: |
          set -eo pipefail
          for bundle in bundles/*/*.flatpak; do
            echo "Importing $bundle..."
            flatpak build-import-bundle \
              --update-appstream \
              --gpg-sign='${{ secrets.gpgKeyId }}' \
              repo \
              "$bundle"
          done
      - name: Generate static deltas
        run: flatpak build-update-repo --generate-static-deltas --prune --gpg-sign='${{ secrets.gpgKeyId }}' repo
      - name: Delete GPG key
        if: always()
        continue-on-error: true
        run: gpg --batch --yes --delete-secret-keys '${{ secrets.gpgKeyId }}'
      - name: Commit repository updates
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          branch: gh-pages
          repository: repo
          skip_dirty_check: true
