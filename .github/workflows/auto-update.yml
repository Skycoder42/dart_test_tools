on:
  workflow_call:
    inputs:
      flutterSdkChannel:
        type: string
        required: false
        default: stable
        description: The Flutter-SDK channel. Passed as "channel" to "subosito/flutter-action".
      workingDirectory:
        type: string
        required: false
        default: .
        description: The root directory of the dart package to build and test.
      flutterCompat:
        type: boolean
        required: false
        default: true
        description: Whether the update needs to ensure the package stays compatible to the latest flutter or not.
      validationWorkflow:
        type: string
        required: true
        description: The name or id of the workflow that must be run and succeed for the pull request to be able to merge.
jobs:
  check-update-required:
    name: Check if updates are required
    outputs:
      needs_update: ${{ steps.check_auto_update.outputs.needs_update }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Flutter-SDK (${{ inputs.flutterSdkChannel }})
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutterSdkChannel }}
          cache: true
      - name: Download flutter binary artifacts
        run: flutter precache --universal
      - name: Install tools
        uses: Skycoder42/dart_test_tools/.github/actions/install-tools@main
        with:
          withDartTestTools: "true"
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Restore dart packages
        run: flutter pub get
        working-directory: ${{ inputs.workingDirectory }}
      - id: check_auto_update
        name: Check if updates are needed
        run: flutter pub global run dart_test_tools:auto_update --mode check --target '${{ inputs.workingDirectory }}'
  auto-update:
    name: Automatic dependency updates
    needs:
      - check-update-required
    if: needs.check-update-required.outputs.needs_update == 'true'
    permissions:
      contents: write
      pull-requests: write
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Install Flutter-SDK (${{ inputs.flutterSdkChannel }})
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutterSdkChannel }}
          cache: true
      - name: Download flutter binary artifacts
        run: flutter precache --universal
      - name: Install tools
        uses: Skycoder42/dart_test_tools/.github/actions/install-tools@main
        with:
          withDartTestTools: "true"
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Restore dart packages
        run: flutter pub get
        working-directory: ${{ inputs.workingDirectory }}
      - name: Update dependencies
        run: flutter pub global run dart_test_tools:auto_update --mode update --target '${{ inputs.workingDirectory }}' ${{ inputs.flutterCompat && '--flutter-compat' || '--no-flutter-compat' }} --bump-version --report '${{ runner.temp }}/update_log.md'
      - name: Create validated pull request
        uses: Skycoder42/dart_test_tools/.github/actions/create-validated-pr@main
        with:
          prBranchName: automatic-dependency-updates
          prCommitMessage: Automatic dependency updates
          prBody: ${{ runner.temp }}/update_log.md
          prBodyIsPath: "true"
          validationWorkflow: ${{ inputs.validationWorkflow }}
