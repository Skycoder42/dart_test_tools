on:
  workflow_call:
    inputs:
      dartSdkVersion:
        type: string
        required: false
        default: stable
        description: The Dart-SDK version. Passed as "sdk" to "dart-lang/setup-dart".
      artifactPrefix:
        type: string
        required: false
        default: ""
        description: The prefix for build/bundle artifact names, combined into the normalized "<prefix>-<type>-<platform>" name. If left empty, it falls back at runtime to the package name from the pubspec.yaml in "workingDirectory". Set this to keep artifact names unique when multiple packages are built within the same pipeline.
      workingDirectory:
        type: string
        required: false
        default: .
        description: The root directory of the dart package to build and test.
      additionalArtifacts:
        type: string
        required: false
        description: An optional artifact name pattern (minimatch, e.g. "assets-*" or "{icons,man-pages}") of additional artifacts to download and merge into "additionalArtifactsPath" before packaging.
      additionalArtifactsPath:
        type: string
        required: false
        default: artifacts
        description: The destination directory (relative to the checkout root) that the artifacts matched by "additionalArtifacts" are merged into.
      packageType:
        type: string
        required: false
        default: deb
        description: The nfpm package type to build (deb, rpm, apk, archlinux).
    outputs:
      artifactName:
        value: ${{ jobs.build_nfpm.outputs.artifact-name }}
        description: The name (or, for matrix builds, the minimatch pattern) of the artifact(s) produced by this build/bundle workflow. Can be passed to a deployment workflow to link it to this build explicitly.
jobs:
  build_nfpm:
    name: Build nfpm package
    outputs:
      artifact-name: ${{ steps.export-artifact-name.outputs.artifact-name }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Dart-SDK (${{ inputs.dartSdkVersion }})
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ inputs.dartSdkVersion }}
      - name: Install nfpm
        run: |
          set -eo pipefail
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm
      - name: Install tools
        uses: Skycoder42/dart_test_tools/.github/actions/install-tools@main
        with:
          withDartTestTools: "true"
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - id: resolve-artifact-prefix
        name: Resolve artifact prefix
        if: inputs.artifactPrefix == ''
        run: echo "prefix=$(yq -r .name pubspec.yaml)" >> $GITHUB_OUTPUT
        working-directory: ${{ inputs.workingDirectory }}
        shell: bash
      - name: Download bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.artifactPrefix || steps.resolve-artifact-prefix.outputs.prefix }}-cli-linux
          path: ${{ runner.temp }}/bundle-archive
      - name: Extract bundle
        run: |
          set -eo pipefail
          mkdir -p "$RUNNER_TEMP/bundle"
          tar -xavf "$RUNNER_TEMP"/bundle-archive/*.tar.xz -C "$RUNNER_TEMP/bundle" --strip-components=1
        shell: bash
      - name: Download additional artifacts
        if: inputs.additionalArtifacts != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ${{ inputs.additionalArtifacts }}
          path: ${{ inputs.additionalArtifactsPath }}
          merge-multiple: true
      - name: Generate nfpm configuration from dart package
        run: generate-nfpm --input ${{ inputs.workingDirectory }} --bundle-root "$RUNNER_TEMP/bundle" --output "$RUNNER_TEMP/nfpm"
        shell: bash
      - name: Build package with nfpm
        run: |
          set -eo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          nfpm package -f "$RUNNER_TEMP/nfpm/nfpm.yaml" -p '${{ inputs.packageType }}' -t "$RUNNER_TEMP/out"
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.artifactPrefix || steps.resolve-artifact-prefix.outputs.prefix }}-${{ inputs.packageType }}-linux
          path: ${{ runner.temp }}/out/*
          retention-days: 1
          if-no-files-found: error
      - id: export-artifact-name
        name: Export artifact name
        run: echo "artifact-name=${{ inputs.artifactPrefix || steps.resolve-artifact-prefix.outputs.prefix }}-${{ inputs.packageType }}-linux" >> $GITHUB_OUTPUT
        shell: bash
