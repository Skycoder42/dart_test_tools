on:
  workflow_call:
    inputs:
      enabledPlatforms:
        type: string
        required: true
        description: A JSON-encoded list of all platforms that this project can build/run for.
      env:
        type: string
        required: false
        default: '{}'
        description: Optional environment variables to be set for the whole workflow.
      needsFlutterSdk:
        type: boolean
        required: false
        default: false
        description: Specifies whether this dart package needs the flutter SDK. This can be the case if the package is part of a workspace that also contains a flutter package.
      dartSdkVersion:
        type: string
        required: false
        default: stable
        description: The Dart-SDK version. Passed as "sdk" to "dart-lang/setup-dart".
      flutterSdkChannel:
        type: string
        required: false
        default: stable
        description: The Flutter-SDK channel. Passed as "channel" to "subosito/flutter-action".
      withSubmodules:
        type: boolean
        required: false
        default: false
        description: Specify if submodules should be initialized or not.
      workingDirectory:
        type: string
        required: false
        default: .
        description: The root directory of the dart package to build and test.
      buildDependencies:
        type: string
        required: false
        description: A spaces separated list of other packages within this workspace that make use of build_runner and need to be built before this package.
      buildRunner:
        type: boolean
        required: false
        default: false
        description: Specify whether build_runner is used in the project (defaults to false).
      buildRunnerArgs:
        type: string
        required: false
        description: Optional additional arguments to be passed to the build runner.
      archivePrefix:
        type: string
        required: false
        description: The prefix of the binary archive files that contain the actual binaries. Will be suffixed with the platform name. If left empty, it will fallback to "<package_name>-<package-version>".
      artifactPrefix:
        type: string
        required: false
        default: ""
        description: The prefix for build/bundle artifact names, combined into the normalized "<prefix>-<type>-<platform>" name. If left empty, it falls back at runtime to the package name from the pubspec.yaml in "workingDirectory". Set this to keep artifact names unique when multiple packages are built within the same pipeline.
    outputs:
      artifactName:
        value: ${{ jobs.compile.outputs.artifact-name }}
        description: The name (or, for matrix builds, the minimatch pattern) of the artifact(s) produced by this build/bundle workflow. Can be passed to a deployment workflow to link it to this build explicitly.
env: ${{ fromJSON(inputs.env) }}
jobs:
  compile:
    name: Create compiled artifacts
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - macos
          - windows
        include:
          - platform: linux
            os: ubuntu-latest
            executableSuffix: ""
            archiveType: tar
          - platform: macos
            os: macos-latest
            executableSuffix: ""
            archiveType: tar
          - platform: windows
            os: windows-latest
            executableSuffix: .exe
            archiveType: zip
    outputs:
      artifact-name: ${{ steps.export-artifact-name.outputs.artifact-name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Dart-SDK (${{ inputs.dartSdkVersion }})
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && !inputs.needsFlutterSdk
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ inputs.dartSdkVersion }}
      - name: Install Flutter-SDK (${{ inputs.flutterSdkChannel }})
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.needsFlutterSdk
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ inputs.flutterSdkChannel }}
          cache: true
      - name: Download flutter binary artifacts
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.needsFlutterSdk
        run: flutter precache --universal
      - name: Install tools
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        uses: Skycoder42/dart_test_tools/.github/actions/install-tools@main
        with:
          withDartTestTools: "false"
      - name: Checkout repository
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          submodules: ${{ inputs.withSubmodules }}
      - name: Restore dart packages
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        run: dart pub get
        working-directory: ${{ inputs.workingDirectory }}
      - name: Run build_runner for workspace dependencies
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.buildDependencies != ''
        run: |
          set -euo pipefail
          for package in ${{ inputs.buildDependencies }}; do
            echo ">> Running build_runner for $package"
            path=$(
              dart pub workspace list --json \
                | jq -r \
                  --arg package "$package" \
                  '.packages[] | select(.name == $package) | .path'
            )
            cd "$path"
            dart run build_runner build --delete-conflicting-outputs
          done
        working-directory: ${{ inputs.workingDirectory }}
        shell: bash
      - name: Create build files
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.buildRunner
        run: dart run build_runner build --release ${{ inputs.buildRunnerArgs }}
        working-directory: ${{ inputs.workingDirectory }}
      - id: detect-archive-name
        name: Detect archive name
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.archivePrefix == ''
        run: |
          set -euo pipefail
          package_name=$(yq -r .name pubspec.yaml)
          package_version=$(yq -r .version pubspec.yaml)
          echo "archive-name=$package_name-$package_version" >> $GITHUB_OUTPUT
        working-directory: ${{ inputs.workingDirectory }}
        shell: bash
      - name: Compile executables
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        run: |
          set -euo pipefail
          yq ".executables.[] | key" pubspec.yaml | while read executableName; do
            echo "::group::Compiling $executableName"
            dartScript=$(yq ".executables.[\"$executableName\"] // \"$executableName\"" pubspec.yaml)
            dart build cli -t "bin/$dartScript.dart" -o build/cli
            if [[ "$executableName" != "$dartScript" ]]; then
              echo ">> Renaming $dartScript to $executableName"
              mv \
                "build/cli/bundle/bin/$dartScript${{ matrix.executableSuffix }}" \
                "build/cli/bundle/bin/$executableName${{ matrix.executableSuffix }}"
            fi
            echo "::endgroup::"
          done
          echo '>> Renaming bundle directory to ${{ inputs.archivePrefix || steps.detect-archive-name.outputs.archive-name }}'
          mv build/cli/bundle 'build/cli/${{ inputs.archivePrefix || steps.detect-archive-name.outputs.archive-name }}'
        working-directory: ${{ inputs.workingDirectory }}
        shell: bash
      - name: Create release archive (tar)
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && matrix.archiveType == 'tar'
        run: |
          set -euo pipefail
          mkdir -p ../artifacts
          tar -cavf '../artifacts/${{ inputs.archivePrefix || steps.detect-archive-name.outputs.archive-name }}-${{ matrix.platform }}.tar.xz' .
        working-directory: ${{ inputs.workingDirectory }}/build/cli
        shell: bash
      - name: Create release archive (zip)
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && matrix.archiveType == 'zip'
        run: |
          set -eo pipefail
          mkdir -p ../artifacts
          7z a -y '../artifacts/${{ inputs.archivePrefix || steps.detect-archive-name.outputs.archive-name }}-${{ matrix.platform }}.zip' .
        working-directory: ${{ inputs.workingDirectory }}/build/cli
        shell: bash
      - id: resolve-artifact-prefix
        name: Resolve artifact prefix
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform)) && inputs.artifactPrefix == ''
        run: echo "prefix=$(yq -r .name pubspec.yaml)" >> $GITHUB_OUTPUT
        working-directory: ${{ inputs.workingDirectory }}
        shell: bash
      - name: Upload artifact
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.artifactPrefix || steps.resolve-artifact-prefix.outputs.prefix }}-cli-${{ matrix.platform }}
          path: ${{ inputs.workingDirectory }}/build/artifacts/*
          retention-days: 1
          if-no-files-found: error
      - id: export-artifact-name
        name: Export artifact name
        if: (inputs.enabledPlatforms == '[]' || contains(fromJSON(inputs.enabledPlatforms), matrix.platform))
        run: echo "artifact-name=${{ inputs.artifactPrefix || steps.resolve-artifact-prefix.outputs.prefix }}-cli-*" >> $GITHUB_OUTPUT
        shell: bash
